];

// вЂљГ®Г„вЂљГ®Г„ Chart-Konfiguration (Funktion, um Mutation zu verhindern) вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const FONT = { family: "'Inter', system-ui, sans-serif" };
const TOOLTIP = {
  backgroundColor: 'rgba(10,10,20,0.97)', titleColor: '#f1f5f9',
  bodyColor: '#94a3b8', borderColor: 'rgba(139,92,246,0.3)',
  borderWidth: 1, padding: 10, cornerRadius: 8,
};
const fmtTick = v => v >= 10000 ? (v/1000).toFixed(0)+'k' : v >= 1000 ? (v/1000).toFixed(1).replace('.0','')+'k' : v;

// mkCfg: beginAtZero=true fuer Balken, false fuer Linien (auto-skaliert auf Datenwerte)
const mkCfg = (extra = {}) => ({
  responsive: true,
  maintainAspectRatio: false,
  animation: { duration: 350 },
  plugins: {
    legend: { labels: { color: '#94a3b8', padding: 12, usePointStyle: true, font: { ...FONT, size: 11 } } },
    tooltip: TOOLTIP,
    ...((extra.plugins) || {}),
  },
  scales: {
    x: {
      ticks: { color: '#475569', maxRotation: 35, font: { ...FONT, size: 10 } },
      grid: { color: 'rgba(255,255,255,0.04)' },
    },
    y: {
      ticks: { color: '#475569', precision: 0, maxTicksLimit: 5, font: { ...FONT, size: 10 }, callback: fmtTick },
      grid: { color: 'rgba(255,255,255,0.04)' },
      beginAtZero: extra.beginAtZero !== false,  // default true; set false fuer Linien
    },
    ...((extra.scales) || {}),
  },
});

const mkCfgNoScale = () => ({
  responsive: true,
  maintainAspectRatio: false,
  animation: { duration: 400 },
  plugins: {
    legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 10, usePointStyle: true, font: { ...FONT, size: 11 } } },
    tooltip: TOOLTIP,
  },
});

// вЂљГ®Г„вЂљГ®Г„ Hilfsfunktionen вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const genId  = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const today  = () => new Date().toISOString().split('T')[0];
const daysAgo = n => new Date(Date.now() - n * 864e5).toISOString().split('T')[0];
const fmtDe  = d => { if (!d) return ''; const [y,m,dd] = d.split('-'); return `${dd}.${m}.${y}`; };
const fmtShort = d => { if (!d) return ''; const [,m,dd] = d.split('-'); return `${dd}.${m}`; };
const fmtRange = (d, t) => t && t !== d ? `${fmtDe(d)} - ${fmtDe(t)}` : fmtDe(d);
const monthLabel = ym => {
  const [y, m] = ym.split('-');
  return new Date(y, m - 1, 1).toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
};
const firstOfMonth = ym => `${ym}-01`;
const lastOfMonth  = ym => { const [y,m] = ym.split('-').map(Number); return new Date(y,m,0).toISOString().split('T')[0]; };
const calcTotals = ents => METRICS.reduce((acc,m) => ({ ...acc, [m.key]: ents.reduce((s,e) => s+(Number(e[m.key])||0),0) }), {});
const dPct = (a,b) => a===0 ? (b>0?100:0) : Math.round(((b-a)/a)*100);

// вЂљГ®Г„вЂљГ®Г„ ChartCanvas вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
// Jede Instanz bekommt eine eigene Kopie der Options &mdash; verhindert Chart.js-Mutation
const ChartCanvas = ({ id, type, data, options, h = 240 }) => {
  const ref  = useRef(null);
  const inst = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }
    if (!data?.labels?.length) return;
    inst.current = new Chart(ref.current.getContext('2d'), { type, data, options });
    return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
  }, [id]); // id enth&auml;lt alle relevanten Abh&auml;ngigkeiten

  if (!data?.labels?.length)
    return <div style={{height:h}} className="flex items-center justify-center text-slate-600 text-sm">Keine Daten im Zeitraum</div>;
  return <canvas ref={ref} style={{ height: h, display: 'block' }} />;
};

const ChartCard = ({ title, children, extra, defaultOpen=true, className='' }) => {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className={`glass rounded-2xl glow overflow-hidden ${className}`}>
      <button onClick={()=>setOpen(p=>!p)}
        className="w-full flex items-center justify-between px-5 py-3 hover:bg-white/5 transition-all">
        <h3 className="font-semibold text-slate-200 text-sm">{title}</h3>
        <div className="flex items-center gap-2">
          {extra}
          <span className="text-slate-500 transition-transform" style={{transform:open?'rotate(0deg)':'rotate(-90deg)',display:'inline-flex',transition:'transform .2s'}}>
            <SI p={IC.chevDown} size={13}/>
          </span>
        </div>
      </button>
      {open && <div className="px-5 pb-4">{children}</div>}
    </div>
  );
};

// вЂљГ®Г„вЂљГ®Г„ Excel-Export вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const exportExcel = (entries, eventTypes) => {
  const wb = XLSX.utils.book_new();
  const etMap = Object.fromEntries(eventTypes.map(t => [t.id, t.name]));
  const tot   = calcTotals(entries);

  // Stil-Helfer
  const HS = (rgb='3B0764') => ({ font:{bold:true,color:{rgb:'FFFFFF'},sz:11}, fill:{patternType:'solid',fgColor:{rgb}}, alignment:{horizontal:'center',vertical:'center'} });
  const BS = { font:{bold:true}, alignment:{horizontal:'left'} };
  const NS = (align='right') => ({ alignment:{horizontal:align} });
  const GS = { font:{color:{rgb:'64748B'},sz:10}, alignment:{horizontal:'left'} };
  const H  = (v,rgb='4C1D95') => ({v, t:'s', s:HS(rgb)});
  const B  = v => ({v, t:'s', s:BS});
  const N  = (v,fmt='0') => ({v:Number(v)||0, t:'n', z:fmt, s:NS()});
  const NF = v => ({v:Number(v)||0, t:'n', z:'0.0', s:NS()});
  const G  = v => ({v, t:'s', s:GS});
  const T  = v => ({v, t:'s'});

  // вЂљГ®Г„вЂљГ®Г„ Sheet 1: Zusammenfassung вЂљГ®Г„вЂљГ®Г„
  const etSection = [...eventTypes, {id:'',name:'(kein Typ)'}]
    .map(et => {
      const sub = entries.filter(e=>(e.eventTypeId||'')===et.id);
      if (!sub.length && et.id) return null;
      const subTot = calcTotals(sub);
      return [B(et.name), N(sub.length), ...METRICS.map(m=>N(subTot[m.key])),
        NF(sub.length ? subTot.besucher/sub.length : 0)];
    }).filter(Boolean);

  const ws1rows = [
    [H('REVIVE Youth Stats','3B0764'), H('','3B0764'), H('','3B0764'), H('','3B0764'), H('','3B0764'), H('','3B0764')],
    [G(`Exportiert: ${fmtDe(today())}  |  Eintr\u00e4ge gesamt: ${entries.length}`), G(''), G(''), G(''), G(''), G('')],
    [],
    [H('Metrik','5B21B6'), H('Gesamt','5B21B6'), H('Avg. pro Event','5B21B6'), H('Maximum','5B21B6'), H('Minimum','5B21B6'), H('Top-Event','5B21B6')],
    ...METRICS.map(m => {
      const vals = entries.map(e=>Number(e[m.key])||0);
      const maxIdx = vals.indexOf(Math.max(...vals));
      const topEvt = entries[maxIdx]?.event || (entries[maxIdx] ? fmtDe(entries[maxIdx].date) : '\u2014');
      return [B(m.label), N(tot[m.key]), NF(entries.length?tot[m.key]/entries.length:0),
        N(vals.length?Math.max(...vals):0), N(vals.length?Math.min(...vals):0), T(topEvt)];
    }),
    [],
    [H('Nach Event-Typ','5B21B6'), H('Events','5B21B6'), H('Besucher','5B21B6'),
     H('Erstbesucher','5B21B6'), H('Entscheidungen','5B21B6'), H('Taufen','5B21B6'), H('Avg. Besucher','5B21B6')],
    ...etSection,
  ];
  const ws1 = XLSX.utils.aoa_to_sheet(ws1rows);
  ws1['!cols'] = [26,12,16,12,12,24].map(w=>({wch:w}));
  ws1['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:5}},
    {s:{r:1,c:0},e:{r:1,c:5}},
  ];
  ws1['!rows'] = [{hpt:22},{hpt:16}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Zusammenfassung');

  // вЂљГ®Г„вЂљГ®Г„ Sheet 2: Alle Daten вЂљГ®Г„вЂљГ®Г„
  const sorted = [...entries].sort((a,b)=>b.date.localeCompare(a.date));
  const ws2rows = [
    [H('Datum'),H('Datum bis'),H('Event'),H('Event-Typ'),H('Besucher'),H('Erstbesucher'),H('Entscheidungen'),H('Taufen'),H('Notizen')],
    ...sorted.map(e=>[
      T(fmtDe(e.date)), T(e.dateTo?fmtDe(e.dateTo):''),
      T(e.event||''), T(etMap[e.eventTypeId]||''),
      N(e.besucher), N(e.erstbesucher), N(e.entscheidungen), N(e.taufen),
      T(e.notes||''),
    ]),
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(ws2rows);
  ws2['!cols'] = [12,12,32,22,12,14,16,10,50].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Alle Daten');

  // вЂљГ®Г„вЂљГ®Г„ Sheet 3: Monatlich вЂљГ®Г„вЂљГ®Г„
  const mMap = {};
  entries.forEach(e=>{
    const k=e.date.slice(0,7);
    if(!mMap[k]) mMap[k]={count:0,besucher:0,erstbesucher:0,entscheidungen:0,taufen:0};
    METRICS.forEach(m=>mMap[k][m.key]+=Number(e[m.key])||0);
    mMap[k].count++;
  });
  const months = Object.entries(mMap).sort();
  const ws3rows = [
    [H('Monat'),H('Events'),H('Besucher'),H('Erstbesucher'),H('Entscheidungen'),H('Taufen'),
     H('Avg. Besucher'),H('Avg. Erstbesucher'),H('Avg. Entscheidungen'),H('Avg. Taufen')],
    ...months.map(([k,v])=>[
      B(monthLabel(k)), N(v.count),
      N(v.besucher), N(v.erstbesucher), N(v.entscheidungen), N(v.taufen),
      NF(v.besucher/v.count), NF(v.erstbesucher/v.count),
      NF(v.entscheidungen/v.count), NF(v.taufen/v.count),
    ]),
    [],
    [B('GESAMT'), N(entries.length), ...METRICS.map(m=>N(tot[m.key])), NF(months.length?months.reduce((s,[,v])=>s+v.besucher,0)/months.length:0)],
  ];
  const ws3 = XLSX.utils.aoa_to_sheet(ws3rows);
  ws3['!cols'] = [22,8,12,14,16,10,13,15,18,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws3, 'Monatlich');

  // вЂљГ®Г„вЂљГ®Г„ Sheet 4: Quartal вЂљГ®Г„вЂљГ®Г„
  const qMap = {};
  entries.forEach(e=>{
    const yr=e.date.slice(0,4), mo=parseInt(e.date.slice(5,7)), q=Math.ceil(mo/3);
    const k=`${yr}-Q${q}`;
    if(!qMap[k]) qMap[k]={count:0,besucher:0,erstbesucher:0,entscheidungen:0,taufen:0};
    METRICS.forEach(m=>qMap[k][m.key]+=Number(e[m.key])||0);
    qMap[k].count++;
  });
  const ws4rows = [
    [H('Quartal'),H('Events'),H('Besucher'),H('Erstbesucher'),H('Entscheidungen'),H('Taufen'),H('Avg. Besucher'),H('Avg. Erstbesucher')],
    ...Object.entries(qMap).sort().map(([k,v])=>[
      B(k), N(v.count),
      N(v.besucher), N(v.erstbesucher), N(v.entscheidungen), N(v.taufen),
      NF(v.besucher/v.count), NF(v.erstbesucher/v.count),
    ]),
  ];
  const ws4 = XLSX.utils.aoa_to_sheet(ws4rows);
  ws4['!cols'] = [10,8,12,14,16,10,13,15].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws4, 'Quartal');

  // вЂљГ®Г„вЂљГ®Г„ Sheet 5: J&auml;hrlich вЂљГ®Г„вЂљГ®Г„
  const yMap = {};
  entries.forEach(e=>{
    const k=e.date.slice(0,4);
    if(!yMap[k]) yMap[k]={count:0,besucher:0,erstbesucher:0,entscheidungen:0,taufen:0};
    METRICS.forEach(m=>yMap[k][m.key]+=Number(e[m.key])||0);
    yMap[k].count++;
  });
  const ws5rows = [
    [H('Jahr'),H('Events'),H('Besucher'),H('Erstbesucher'),H('Entscheidungen'),H('Taufen'),
     H('Avg. Besucher/Event'),H('Avg. Erstbesucher/Event'),H('Avg. Entscheidungen/Event'),H('Avg. Taufen/Event')],
    ...Object.entries(yMap).sort().map(([k,v])=>[
      B(k), N(v.count),
      N(v.besucher), N(v.erstbesucher), N(v.entscheidungen), N(v.taufen),
      NF(v.besucher/v.count), NF(v.erstbesucher/v.count),
      NF(v.entscheidungen/v.count), NF(v.taufen/v.count),
    ]),
    [],
    [B('GESAMT'), N(entries.length), ...METRICS.map(m=>N(tot[m.key]))],
  ];
  const ws5 = XLSX.utils.aoa_to_sheet(ws5rows);
  ws5['!cols'] = [8,8,12,14,16,10,18,20,20,16].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws5, 'J\u00e4hrlich');

  XLSX.writeFile(wb, `revive-stats-${today()}.xlsx`, {cellStyles:true});
};

// вЂљГ®Г„вЂљГ®Г„ Dashboard вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const Dashboard = ({ entries, eventTypes }) => {
  const [from,    setFrom]    = useState(daysAgo(90));
  const [to,      setTo]      = useState(today());
  const [preset,  setPreset]  = useState('90d');
  const [active,  setActive]  = useState(METRICS.map(m => m.key));
  const [view,    setView]    = useState('bar');
  const [etF,     setEtF]     = useState('all');

  const applyPreset = p => {
    setPreset(p);
    const t = today();
    let f = daysAgo(90);
    if (p==='30d')  f = daysAgo(30);
    if (p==='year') f = `${new Date().getFullYear()}-01-01`;
    if (p==='all')  f = entries.length ? entries.reduce((mn,e)=>e.date<mn?e.date:mn, entries[0].date) : '2020-01-01';
    setFrom(f); setTo(t);
  };

  const filtered = useMemo(() => {
    let list = [...entries].filter(e => e.date>=from && e.date<=to);
    if (etF !== 'all') list = list.filter(e => e.eventTypeId===etF);
    return list.sort((a,b) => a.date.localeCompare(b.date));
  }, [entries, from, to, etF]);

  const totals  = useMemo(() => calcTotals(filtered), [filtered]);
  const totKey  = METRICS.map(m=>totals[m.key]).join('-'); // f&uuml;r Chart-IDs
  const activeM = METRICS.filter(m => active.includes(m.key));

  const labels = filtered.map(e => fmtShort(e.date) + (e.event ? ` - ${e.event.slice(0,10)}` : ''));

  const makeLineData = (fill=false) => ({
    labels,
    datasets: activeM.map(m => ({
      label: m.label, data: filtered.map(e=>Number(e[m.key])||0),
      borderColor: m.color, backgroundColor: m.color+'22',
      fill, tension: 0.4, pointRadius: 4, pointHoverRadius: 6,
    })),
  });

  const barData = {
    labels,
    datasets: activeM.map(m => ({
      label: m.label, data: filtered.map(e=>Number(e[m.key])||0),
      backgroundColor: m.color+'bb', borderRadius: 4,
    })),
  };

  const cumulData = {
    labels,
    datasets: activeM.map(m => {
      let c = 0;
      return {
        label: m.label,
        data: filtered.map(e=>{ c += Number(e[m.key])||0; return c; }),
        borderColor: m.color, backgroundColor: m.color+'18',
        fill: true, tension: 0.4, pointRadius: 3,
      };
    }),
  };

  const donutData = (() => {
    const vals = METRICS.map(m=>totals[m.key]);
    if (!vals.some(v=>v>0)) return null;
    return {
      labels: METRICS.map(m=>m.label),
      datasets: [{ data: vals, backgroundColor: METRICS.map(m=>m.color+'bb'), borderColor: METRICS.map(m=>m.color), borderWidth: 2, hoverOffset: 6 }],
    };
  })();

  const etData = (() => {
    const types = eventTypes.filter(et => filtered.some(e=>e.eventTypeId===et.id));
    if (!types.length) return null;
    return {
      labels: types.map(t=>t.name),
      datasets: activeM.map(m => ({
        label: m.label,
        data: types.map(t=>filtered.filter(e=>e.eventTypeId===t.id).reduce((s,e)=>s+(Number(e[m.key])||0),0)),
        backgroundColor: m.color+'bb', borderRadius: 4,
      })),
    };
  })();

  const mainData = view==='bar' ? barData : view==='area' ? makeLineData(true) : makeLineData(false);
  const mainType = view==='bar' ? 'bar' : 'line';
  const mainId   = `main-${view}-${from}-${to}-${active.join()}-${etF}-${totKey}`;

  const toggle = k => setActive(p => p.includes(k) ? p.filter(x=>x!==k) : [...p,k]);

  const PreBtn = ({p,l}) => (
    <button onClick={()=>applyPreset(p)}
      className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${preset===p?'bg-violet-600 text-white':'bg-white/5 text-slate-400 hover:bg-white/10'}`}>
      {l}
    </button>
  );

  return (
    <div className="space-y-5 up">
      <div>
        <h1 className="text-xl font-bold grad">Dashboard</h1>
        <p className="text-slate-500 text-sm mt-0.5">{filtered.length} Eintr&auml;ge im Zeitraum - {entries.length} gesamt</p>
      </div>

      {/* Filter-Leiste */}
      <div className="glass rounded-2xl p-4 space-y-3">
        <div className="flex flex-wrap gap-2 items-center">
          <PreBtn p="30d" l="30 Tage"/>
          <PreBtn p="90d" l="90 Tage"/>
          <PreBtn p="year" l="Dieses Jahr"/>
          <PreBtn p="all" l="Alle"/>
          <div className="flex gap-2 ml-auto flex-wrap">
            <div className="flex items-center gap-1.5">
              <span className="text-slate-500 text-xs">Von</span>
              <input type="date" value={from} onChange={e=>{setFrom(e.target.value);setPreset('');}}
                className="bg-white/5 border border-white/10 rounded-lg px-2.5 py-1.5 text-xs text-slate-200 w-36"/>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="text-slate-500 text-xs">Bis</span>
              <input type="date" value={to} onChange={e=>{setTo(e.target.value);setPreset('');}}
                className="bg-white/5 border border-white/10 rounded-lg px-2.5 py-1.5 text-xs text-slate-200 w-36"/>
            </div>
          </div>
        </div>
        <div className="flex gap-2 flex-wrap items-center">
          <span className="text-slate-600 text-xs">Metriken:</span>
          {METRICS.map(m=>(
            <button key={m.key} onClick={()=>toggle(m.key)}
              className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium transition-all"
              style={{
                background: active.includes(m.key) ? m.color+'20' : 'rgba(255,255,255,0.04)',
                border: `1px solid ${active.includes(m.key) ? m.color+'60' : 'transparent'}`,
                color: active.includes(m.key) ? m.color : '#475569',
              }}>
              <span className="dot" style={{background: active.includes(m.key)?m.color:'#475569'}}/>
              {m.label}
            </button>
          ))}
          <div className="ml-auto">
            <select value={etF} onChange={e=>setEtF(e.target.value)}
              className="bg-white/5 border border-white/10 rounded-lg px-2.5 py-1.5 text-xs text-slate-300">
              <option value="all">Alle Event-Typen</option>
              {eventTypes.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* KPI-Karten */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        {METRICS.map(m=>(
          <div key={m.key} className="glass glow rounded-2xl p-4 up">
            <div className="flex items-center gap-2 mb-2">
              <span className="dot" style={{width:10,height:10,background:m.color}}/>
              <span className="text-slate-400 text-xs font-medium">{m.label}</span>
            </div>
            <div className="text-3xl font-bold" style={{color:m.color}}>{totals[m.key]}</div>
            <div className="text-slate-600 text-xs mt-1">
              {filtered.length ? `Avg. ${(totals[m.key]/filtered.length).toFixed(1)} pro Event` : '\u2014'}
            </div>
          </div>
        ))}
      </div>

      {/* Hauptgrafik */}
      <ChartCard title={"Entwicklung \u00fcber Zeit"}
        extra={
          <div className="flex gap-1">
            {[['bar','Balken'],['line','Linie'],['area','Fl\u00e4che']].map(([v,l])=>(
              <button key={v} onClick={e=>{e.stopPropagation();setView(v);}}
                className={`px-2 py-1 rounded-lg text-xs font-medium transition-all ${view===v?'bg-violet-600 text-white':'bg-white/5 text-slate-400 hover:bg-white/10'}`}>
                {l}
              </button>
            ))}
          </div>
        }>
        <ChartCanvas id={mainId} type={mainType} data={filtered.length?mainData:null}
          options={mkCfg({ beginAtZero: view==='bar' })} h={190}/>
      </ChartCard>

      {/* Verteilung + Kumulativ */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <ChartCard title="Verteilung gesamt">
          <ChartCanvas id={`donut-${from}-${to}-${etF}-${totKey}`} type="doughnut"
            data={donutData} options={mkCfgNoScale()} h={170}/>
        </ChartCard>
        <ChartCard title="Kumulativer Verlauf">
          <ChartCanvas id={`cum-${from}-${to}-${active.join()}-${etF}-${totKey}`} type="line"
            data={filtered.length?cumulData:null} options={mkCfg({beginAtZero:false})} h={170}/>
        </ChartCard>
      </div>

      {/* Nach Event-Typ */}
      {etF==='all' && etData && (
        <ChartCard title="Vergleich nach Event-Typ">
          <ChartCanvas id={`et-${from}-${to}-${active.join()}-${totKey}`} type="bar"
            data={etData} options={mkCfg()} h={170}/>
        </ChartCard>
      )}

      {/* Einzelne Metriken */}
      {activeM.length>0 && (
        <ChartCard title="Einzelne Metriken" defaultOpen={false}>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pt-1">
            {activeM.map(m => {
              const d = filtered.length ? {
                labels: filtered.map(e=>fmtShort(e.date)),
                datasets: [{label:m.label, data:filtered.map(e=>Number(e[m.key])||0), backgroundColor:m.color+'aa', borderRadius:4}],
              } : null;
              return (
                <div key={m.key} className="rounded-xl p-3" style={{border:`1px solid ${m.color}25`,background:`${m.color}08`}}>
                  <div className="flex items-center gap-2 mb-2">
                    <span className="dot" style={{background:m.color}}/>
                    <span className="font-semibold text-xs" style={{color:m.color}}>{m.label}</span>
                    <span className="ml-auto text-xl font-bold" style={{color:m.color}}>{totals[m.key]}</span>
                  </div>
                  <ChartCanvas id={`${m.key}-${from}-${to}-${etF}-${totals[m.key]}`} type="bar" data={d}
                    options={mkCfg({plugins:{legend:{display:false}}})} h={100}/>
                </div>
              );
            })}
          </div>
        </ChartCard>
      )}

      {/* Tabelle */}
      {filtered.length>0 && (
        <ChartCard title={`Letzte Eintr\u00e4ge (${Math.min(15,filtered.length)} von ${filtered.length})`} defaultOpen={false}>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr style={{borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                  <th className="text-left px-4 py-2 text-slate-500 text-xs font-medium">Datum</th>
                  <th className="text-left px-4 py-2 text-slate-500 text-xs font-medium">Event</th>
                  <th className="text-left px-3 py-2 text-slate-500 text-xs font-medium">Typ</th>
                  {METRICS.map(m=><th key={m.key} className="text-right px-3 py-2 text-xs font-medium" style={{color:m.color}}>{m.label}</th>)}
                </tr>
              </thead>
              <tbody>
                {[...filtered].reverse().slice(0,15).map((e,i)=>{
                  const et = eventTypes.find(t=>t.id===e.eventTypeId);
                  return (
                    <tr key={e.id} style={{borderTop:'1px solid rgba(255,255,255,0.04)', background:i%2===0?'transparent':'rgba(255,255,255,0.015)'}}>
                      <td className="px-4 py-1.5 text-slate-300 whitespace-nowrap text-xs">{fmtRange(e.date, e.dateTo)}</td>
                      <td className="px-4 py-1.5 text-slate-400 max-w-[140px] truncate text-xs">{e.event||'\u2014'}</td>
                      <td className="px-3 py-1.5">
                        {et ? <span className="pill" style={{background:et.color+'22',color:et.color}}>{et.name}</span>
                            : <span className="text-slate-700 text-xs">&mdash;</span>}
                      </td>
                      {METRICS.map(m=><td key={m.key} className="px-3 py-1.5 text-right font-semibold text-sm" style={{color:m.color}}>{Number(e[m.key])||0}</td>)}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </ChartCard>
      )}
    </div>
  );
};

// вЂљГ®Г„вЂљГ®Г„ Zeitraum-Vergleich вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const PERIOD_PALETTE = ['#6366f1','#ec4899','#10b981','#f59e0b','#06b6d4','#a855f7'];

const Comparison = ({ entries, eventTypes }) => {
  const [mode, setMode] = useState('month');
  const [etF,  setEtF]  = useState('all');
  const [periods, setPeriods] = useState([
    { id:'a', ym:'', year:'', from:daysAgo(60),  to:today()       },
    { id:'b', ym:'', year:'', from:daysAgo(120), to:daysAgo(61)  },
  ]);

  const availYM    = useMemo(()=>[...new Set(entries.map(e=>e.date.slice(0,7)))].sort().reverse(),[entries]);
  const availYears = useMemo(()=>[...new Set(entries.map(e=>e.date.slice(0,4)))].sort().reverse(),[entries]);

  const getRaw = p => {
    if (mode==='month')  return p.ym   ? entries.filter(e=>e.date>=firstOfMonth(p.ym)&&e.date<=lastOfMonth(p.ym)) : [];
    if (mode==='year')   return p.year ? entries.filter(e=>e.date>=`${p.year}-01-01`&&e.date<=`${p.year}-12-31`) : [];
    return entries.filter(e=>e.date>=p.from&&e.date<=p.to);
  };

  const periodData = useMemo(()=>periods.map(p=>{
    let list = getRaw(p);
    if (etF!=='all') list = list.filter(e=>e.eventTypeId===etF);
    return { ...p, list, totals: calcTotals(list) };
  }),[periods, entries, mode, etF]);

  const getLabel = p =>
    mode==='month' ? (p.ym   ? monthLabel(p.ym)   : `Zeitraum ${p.id.toUpperCase()}`) :
    mode==='year'  ? (p.year ? p.year              : `Jahr ${p.id.toUpperCase()}`)     :
                     `Zeitraum ${p.id.toUpperCase()}`;

  const hasData = periodData.some(pd=>pd.list.length>0);

  const addPeriod = () => {
    if (periods.length>=6) return;
    const letters='abcdefghijklmnopqrstuvwxyz';
    const nextId = letters[periods.length];
    setPeriods(p=>[...p,{id:nextId,ym:'',year:'',from:daysAgo(180+periods.length*60),to:daysAgo(121+periods.length*60)}]);
  };
  const removePeriod = id => { if (periods.length<=2) return; setPeriods(p=>p.filter(pd=>pd.id!==id)); };
  const updatePeriod = (id,key,val) => setPeriods(p=>p.map(pd=>pd.id===id?{...pd,[key]:val}:pd));

  const compId = `cmp-${mode}-${periods.map(p=>p.ym+p.year+p.from+p.to).join('|')}-${etF}`;
  const inp = "bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-slate-200";

  const compData = hasData ? {
    labels: METRICS.map(m=>m.label),
    datasets: periodData.map((pd,i)=>({
      label: getLabel(pd),
      data: METRICS.map(m=>pd.totals[m.key]),
      backgroundColor: PERIOD_PALETTE[i%PERIOD_PALETTE.length]+'bb',
      borderRadius: 4,
    })),
  } : null;

  return (
    <div className="space-y-5 up">
      <div>
        <h1 className="text-xl font-bold grad">Zeitraum-Vergleich</h1>
        <p className="text-slate-500 text-sm mt-0.5">Mehrere Zeitr&auml;ume gleichzeitig vergleichen</p>
      </div>

      {/* Controls */}
      <div className="glass rounded-2xl p-5 space-y-4">
        <div className="flex gap-2 flex-wrap items-center">
          {[['month','Nach Monat'],['year','Nach Jahr'],['custom','Benutzerdefiniert']].map(([v,l])=>(
            <button key={v} onClick={()=>setMode(v)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${mode===v?'bg-violet-600 text-white':'bg-white/5 text-slate-400 hover:bg-white/10'}`}>
              {l}
            </button>
          ))}
          <div className="ml-auto">
            <select value={etF} onChange={e=>setEtF(e.target.value)} className={inp+" text-xs py-1.5"}>
              <option value="all">Alle Event-Typen</option>
              {eventTypes.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
        </div>

        {/* Period cards */}
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          {periods.map((p,i)=>{
            const col = PERIOD_PALETTE[i%PERIOD_PALETTE.length];
            return (
              <div key={p.id} className="p-3 rounded-xl" style={{border:`1px solid ${col}44`,background:`${col}11`}}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs font-bold" style={{color:col}}>Zeitraum {p.id.toUpperCase()}</span>
                  {periods.length>2 && (
                    <button onClick={()=>removePeriod(p.id)} className="text-slate-600 hover:text-red-400 transition-all ml-2">
                      <SI p={IC.x} size={12}/>
                    </button>
                  )}
                </div>
                {mode==='month' && (
                  <select value={p.ym} onChange={e=>updatePeriod(p.id,'ym',e.target.value)} className={inp+" w-full"}>
                    <option value="">&mdash; Monat w&auml;hlen &mdash;</option>
                    {availYM.map(ym=><option key={ym} value={ym}>{monthLabel(ym)}</option>)}
                  </select>
                )}
                {mode==='year' && (
                  <select value={p.year} onChange={e=>updatePeriod(p.id,'year',e.target.value)} className={inp+" w-full"}>
                    <option value="">&mdash; Jahr w&auml;hlen &mdash;</option>
                    {availYears.map(y=><option key={y} value={y}>{y}</option>)}
                  </select>
                )}
                {mode==='custom' && (
                  <div className="flex gap-2 items-center">
                    <input type="date" value={p.from} onChange={e=>updatePeriod(p.id,'from',e.target.value)} className={inp+" flex-1"}/>
                    <span className="text-slate-600 text-xs">-</span>
                    <input type="date" value={p.to} onChange={e=>updatePeriod(p.id,'to',e.target.value)} className={inp+" flex-1"}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {periods.length<6 && (
          <button onClick={addPeriod}
            className="flex items-center gap-2 text-slate-500 hover:text-violet-400 text-xs font-medium transition-all px-3 py-2 rounded-xl hover:bg-white/5 border border-dashed border-white/10 hover:border-violet-500/30 w-full justify-center">
            <SI p={IC.plus} size={13}/>
            Weiteren Zeitraum hinzuf&uuml;gen
          </button>
        )}
      </div>

      {hasData ? (
        <>
          {/* Summary table */}
          <div className="glass rounded-2xl p-5 glow overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr style={{borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
                  <th className="text-left pb-3 text-slate-500 text-xs font-medium pr-3">Metrik</th>
                  {periodData.map((pd,i)=>(
                    <th key={pd.id} className="text-right pb-3 font-semibold text-xs whitespace-nowrap px-2"
                      style={{color:PERIOD_PALETTE[i%PERIOD_PALETTE.length]}}>
                      {getLabel(pd)}<br/>
                      <span className="text-slate-600 font-normal">({pd.list.length} Events)</span>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {METRICS.map(m=>(
                  <tr key={m.key} style={{borderTop:'1px solid rgba(255,255,255,0.04)'}}>
                    <td className="py-3 pr-3">
                      <div className="flex items-center gap-2">
                        <span className="dot" style={{background:m.color}}/>
                        <span className="text-slate-300 font-medium whitespace-nowrap">{m.label}</span>
                      </div>
                    </td>
                    {periodData.map((pd,i)=>(
                      <td key={pd.id} className="py-3 text-right text-xl font-bold px-2"
                        style={{color:PERIOD_PALETTE[i%PERIOD_PALETTE.length]+'dd'}}>
                        {pd.totals[m.key]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Grouped bar chart */}
          {compData && (
            <ChartCard title="Vergleich gesamt &mdash; alle Metriken">
              <ChartCanvas id={compId} type="bar" data={compData} options={mkCfg()} h={200}/>
            </ChartCard>
          )}

          {/* Per-metric bar charts */}
          <div className="grid grid-cols-2 gap-4">
            {METRICS.map(m=>{
              const mData = hasData ? {
                labels: periodData.map((_,i)=>`Zeitraum ${periods[i].id.toUpperCase()}`),
                datasets:[{
                  label: m.label,
                  data: periodData.map(pd=>pd.totals[m.key]),
                  backgroundColor: periodData.map((_,i)=>PERIOD_PALETTE[i%PERIOD_PALETTE.length]+'cc'),
                  borderRadius: 4,
                }],
              } : null;
              return mData ? (
                <ChartCard key={m.key} title={m.label}>
                  <ChartCanvas id={`cmp-m-${m.key}-${compId}`} type="bar" data={mData}
                    options={mkCfg({plugins:{legend:{display:false}}})} h={130}/>
                </ChartCard>
              ) : null;
            })}
          </div>

          {/* Avg per event */}
          {periodData.filter(pd=>pd.list.length>0).length>=2 && (
            <div className="glass rounded-2xl p-5 glow overflow-x-auto">
              <h3 className="font-semibold text-slate-200 text-sm mb-4">Durchschnitt pro Event</h3>
              <table className="w-full text-sm">
                <thead>
                  <tr style={{borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
                    <th className="text-left pb-3 text-slate-500 text-xs font-medium pr-3">Metrik</th>
                    {periodData.map((pd,i)=>(
                      <th key={pd.id} className="text-right pb-3 text-xs font-medium px-2 whitespace-nowrap"
                        style={{color:PERIOD_PALETTE[i%PERIOD_PALETTE.length]}}>
                        {getLabel(pd)}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {METRICS.map(m=>(
                    <tr key={m.key} style={{borderTop:'1px solid rgba(255,255,255,0.04)'}}>
                      <td className="py-2.5 pr-3">
                        <div className="flex items-center gap-2">
                          <span className="dot" style={{background:m.color}}/>
                          <span className="text-slate-300 whitespace-nowrap">{m.label}</span>
                        </div>
                      </td>
                      {periodData.map(pd=>(
                        <td key={pd.id} className="py-2.5 text-right text-slate-200 font-semibold px-2">
                          {pd.list.length ? (pd.totals[m.key]/pd.list.length).toFixed(1) : <span className="text-slate-700">&mdash;</span>}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </>
      ) : (
        <div className="glass rounded-2xl py-16 text-center">
          <div className="text-slate-400 font-medium mb-1">Zeitr&auml;ume ausw&auml;hlen</div>
          <div className="text-slate-600 text-sm">W&auml;hle oben Zeitr&auml;ume zum Vergleichen aus</div>
        </div>
      )}
    </div>
  );
};

// вЂљГ®Г„вЂљГ®Г„ Eintrag-Formular вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const EntryForm = ({ onSave, initialData, onCancel, eventTypes }) => {
  const [form, setForm] = useState({
    date: today(), dateTo: '', event: '', eventTypeId: '',
    besucher: '', erstbesucher: '', entscheidungen: '', taufen: '',
    notes: '', ...initialData,
  });
  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const selectedType  = eventTypes.find(t=>t.id===form.eventTypeId);
  const isRangeType   = selectedType?.isRange;

  const handleSubmit = e => {
    e.preventDefault();
    if (!form.date) return;
    onSave({
      ...form,
      dateTo: isRangeType ? (form.dateTo||form.date) : '',
      besucher:       Number(form.besucher)||0,
      erstbesucher:   Number(form.erstbesucher)||0,
      entscheidungen: Number(form.entscheidungen)||0,
      taufen:         Number(form.taufen)||0,
    });
  };

  const inp = "w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 transition-all text-sm";

  return (
    <div className="up max-w-2xl">
      <div className="mb-5">
        <h1 className="text-xl font-bold grad">{initialData?'Eintrag bearbeiten':'Neuer Eintrag'}</h1>
        <p className="text-slate-500 text-sm mt-0.5">Zahlen f&uuml;r ein Event erfassen</p>
      </div>
      <form onSubmit={handleSubmit} className="space-y-4">
        <div className="glass rounded-2xl p-5 glow space-y-4">
          <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider">Event-Details</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="block text-slate-400 text-xs mb-1.5">{isRangeType ? 'Startdatum *' : 'Datum *'}</label>
              <input type="date" value={form.date} onChange={e=>set('date',e.target.value)} className={inp} required/>
            </div>
            {isRangeType && (
              <div>
                <label className="block text-slate-400 text-xs mb-1.5">Enddatum</label>
                <input type="date" value={form.dateTo} min={form.date}
                  onChange={e=>set('dateTo',e.target.value)} className={inp}/>
              </div>
            )}
            <div>
              <label className="block text-slate-400 text-xs mb-1.5">Event-Name</label>
              <input type="text" value={form.event} onChange={e=>set('event',e.target.value)}
                placeholder="z. B. Sonntagsgottesdienst" className={inp}/>
            </div>
          </div>
          <div>
            <label className="block text-slate-400 text-xs mb-1.5">Event-Typ</label>
            <select value={form.eventTypeId} onChange={e=>set('eventTypeId',e.target.value)}
              className={inp}
              style={selectedType?{borderColor:selectedType.color+'60',color:selectedType.color}:{}}>
              <option value="">&mdash; Kein Typ &mdash;</option>
              {eventTypes.map(t=>(
                <option key={t.id} value={t.id}>{t.name}{t.isRange?' (Zeitraum)':''}</option>
              ))}
            </select>
            {isRangeType && (
              <p className="text-amber-500/70 text-xs mt-1.5 flex items-center gap-1">
                <SI p={IC.calendar} size={11}/> Zeitraum-Event: Gib optional ein Enddatum an
              </p>
            )}
          </div>
        </div>

        <div className="glass rounded-2xl p-5 glow">
          <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-4">Zahlen</p>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            {METRICS.map(m=>(
              <div key={m.key}>
                <label className="flex items-center gap-1.5 text-xs font-semibold mb-1.5" style={{color:m.color}}>
                  <span className="dot" style={{background:m.color}}/>{m.label}
                </label>
                <input type="number" min="0" value={form[m.key]}
                  onChange={e=>set(m.key,e.target.value)} placeholder="0"
                  className={inp} style={form[m.key]?{borderColor:m.color+'55'}:{}}/>
              </div>
            ))}
          </div>
        </div>

        <div className="glass rounded-2xl p-5 glow">
          <label className="block text-slate-400 text-xs mb-1.5">Notizen</label>
          <textarea value={form.notes} onChange={e=>set('notes',e.target.value)}
            placeholder="Thema, Gastredner, Besonderheiten \u2026" rows={3} className={inp+" resize-none"}/>
        </div>

        <div className="flex gap-3">
          <button type="submit"
            className="flex-1 bg-violet-600 hover:bg-violet-500 active:scale-[0.98] text-white font-semibold py-3 px-6 rounded-xl transition-all text-sm">
            {initialData ? '\u00c4nderungen speichern' : 'Eintrag hinzuf\u00fcgen'}
          </button>
          {onCancel && (
            <button type="button" onClick={onCancel}
              className="px-5 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-slate-400 transition-all text-sm">
              Abbrechen
            </button>
          )}
        </div>
      </form>
    </div>
  );
};

// вЂљГ®Г„вЂљГ®Г„ Eintrags-Liste вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const EntryList = ({ entries, eventTypes, onEdit, onDelete, onAdd }) => {
  const [search,  setSearch]  = useState('');
  const [desc,    setDesc]    = useState(true);
  const [confirm, setConfirm] = useState(null);
  const [fromF,   setFromF]   = useState('');
  const [toF,     setToF]     = useState('');
  const [etF,     setEtF]     = useState('all');
  const [openNote,setOpenNote]= useState(null);

  const filtered = useMemo(()=>{
    let list = [...entries];
    if (search) { const q=search.toLowerCase(); list=list.filter(e=>(e.event||'').toLowerCase().includes(q)||e.date.includes(q)||(e.notes||'').toLowerCase().includes(q)); }
    if (fromF) list=list.filter(e=>e.date>=fromF);
    if (toF)   list=list.filter(e=>e.date<=toF);
    if (etF!=='all') list=list.filter(e=>e.eventTypeId===etF);
    return list.sort((a,b)=>desc?b.date.localeCompare(a.date):a.date.localeCompare(b.date));
  },[entries,search,desc,fromF,toF,etF]);

  const del = id => {
    if (confirm===id) { onDelete(id); setConfirm(null); }
    else { setConfirm(id); setTimeout(()=>setConfirm(c=>c===id?null:c),3000); }
  };

  const inp = "bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-slate-200";

  return (
    <div className="up space-y-4">
      <div className="flex items-start justify-between">
        <div>
          <h1 className="text-xl font-bold grad">Eintr&auml;ge</h1>
          <p className="text-slate-500 text-sm mt-0.5">{entries.length} gesamt - {filtered.length} angezeigt</p>
        </div>
        <button onClick={onAdd}
          className="flex items-center gap-1.5 bg-violet-600 hover:bg-violet-500 text-white text-xs font-semibold px-3 py-2 rounded-xl transition-all">
          <SI p={IC.plus} size={13}/> Neu
        </button>
      </div>

      <div className="glass rounded-2xl p-4 space-y-3">
        <div className="flex gap-2 flex-wrap">
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Suchen \u2026" className={inp+" flex-1 min-w-[130px]"}/>
          <select value={etF} onChange={e=>setEtF(e.target.value)} className={inp}>
            <option value="all">Alle Typen</option>
            {eventTypes.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
          <button onClick={()=>setDesc(p=>!p)}
            className="px-3 py-2 rounded-xl bg-white/5 border border-white/10 text-xs text-slate-400 hover:bg-white/10 transition-all whitespace-nowrap">
            {desc?'Neueste zuerst':'\u00c4lteste zuerst'}
          </button>
        </div>
        <div className="flex gap-2 items-center flex-wrap">
          <span className="text-slate-600 text-xs">Zeitraum:</span>
          <input type="date" value={fromF} onChange={e=>setFromF(e.target.value)} className={inp+" text-xs py-1.5"}/>
          <span className="text-slate-600 text-xs">-</span>
          <input type="date" value={toF} onChange={e=>setToF(e.target.value)} className={inp+" text-xs py-1.5"}/>
          {(fromF||toF)&&<button onClick={()=>{setFromF('');setToF('');}} className="text-xs text-violet-400 hover:text-violet-300">x Zur&uuml;cksetzen</button>}
        </div>
      </div>

      {filtered.length===0 ? (
        <div className="glass rounded-2xl py-16 text-center">
          <div className="text-slate-400 font-medium mb-1">Keine Eintr&auml;ge gefunden</div>
          {entries.length===0&&<button onClick={onAdd} className="mt-3 text-violet-400 hover:text-violet-300 text-sm">Ersten Eintrag erstellen</button>}
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(e=>{
            const et = eventTypes.find(t=>t.id===e.eventTypeId);
            return (
              <div key={e.id} className="glass glass-hover rounded-2xl p-4 transition-all">
                <div className="flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-2">
                      <span className="font-semibold text-slate-200 text-sm">{fmtRange(e.date, e.dateTo)}</span>
                      {e.event&&<span className="text-xs text-slate-300 font-medium">{e.event}</span>}
                      {et&&<span className="pill" style={{background:et.color+'22',color:et.color}}>{et.name}</span>}
                      {et?.isRange&&e.dateTo&&e.dateTo!==e.date&&(
                        <span className="pill" style={{background:'rgba(245,158,11,0.15)',color:'#f59e0b'}}>Zeitraum</span>
                      )}
                    </div>
                    <div className="flex flex-wrap gap-4">
                      {METRICS.map(m=>(
                        <div key={m.key} className="flex items-center gap-1.5">
                          <span className="dot" style={{background:m.color,width:7,height:7}}/>
                          <span className="font-bold text-sm" style={{color:m.color}}>{Number(e[m.key])||0}</span>
                          <span className="text-slate-600 text-xs">{m.label}</span>
                        </div>
                      ))}
                    </div>
                    {e.notes&&(
                      <button onClick={()=>setOpenNote(openNote===e.id?null:e.id)}
                        className="mt-1.5 text-slate-600 hover:text-slate-400 text-xs text-left transition-all">
                        {openNote===e.id?e.notes:`${e.notes.slice(0,60)}${e.notes.length>60?'\u2026':''}`}
                      </button>
                    )}
                  </div>
                  <div className="flex gap-1.5 flex-shrink-0">
                    <button onClick={()=>onEdit(e)}
                      className="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 hover:bg-blue-900/30 text-slate-500 hover:text-blue-400 transition-all">
                      <SI p={IC.edit} size={13}/>
                    </button>
                    <button onClick={()=>del(e.id)}
                      className={`w-8 h-8 flex items-center justify-center rounded-lg transition-all ${confirm===e.id?'bg-red-900/40 text-red-400':'bg-white/5 hover:bg-red-900/25 text-slate-500 hover:text-red-400'}`}
                      title={confirm===e.id?'Nochmal klicken zum L\u00f6schen':'L\u00f6schen'}>
                      <SI p={confirm===e.id?IC.warn:IC.trash} size={13}/>
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// вЂљГ®Г„вЂљГ®Г„ Event-Typ-Verwaltung вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const SWATCH_COLORS = [
  '#6366f1','#8b5cf6','#a855f7','#ec4899',
  '#ef4444','#f97316','#f59e0b','#eab308',
  '#10b981','#14b8a6','#06b6d4','#3b82f6',
];

const ColorPicker = ({ value, onChange }) => (
  <div className="space-y-2">
    <div className="flex flex-wrap gap-1.5">
      {SWATCH_COLORS.map(c=>(
        <button key={c} type="button" onClick={()=>onChange(c)}
          className="w-6 h-6 rounded-full flex-shrink-0 transition-all hover:scale-110"
          style={{
            background: c,
            outline: value===c ? `2px solid ${c}` : '2px solid transparent',
            outlineOffset: '2px',
          }}/>
      ))}
      <label className="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center bg-white/10 border border-white/20 cursor-pointer hover:bg-white/20 transition-all relative overflow-hidden"
        title="Eigene Farbe">
        <span className="text-slate-400 text-xs leading-none select-none">+</span>
        <input type="color" value={value} onChange={e=>onChange(e.target.value)}
          className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"/>
      </label>
    </div>
    <div className="flex items-center gap-2">
      <span className="w-4 h-4 rounded flex-shrink-0" style={{background:value}}/>
      <span className="text-slate-500 text-xs font-mono">{value}</span>
    </div>
  </div>
);

const EventTypeManager = ({ eventTypes, setEventTypes, entries }) => {
  const [name,      setName]      = useState('');
  const [color,     setColor]     = useState('#8b5cf6');
  const [isRange,   setIsRange]   = useState(false);
  const [editId,    setEditId]    = useState(null);
  const [editName,  setEditName]  = useState('');
  const [editColor, setEditColor] = useState('');
  const [editRange, setEditRange] = useState(false);

  const uses = id => entries.filter(e=>e.eventTypeId===id).length;

  const add = () => {
    if (!name.trim()) return;
    setEventTypes(p=>[...p,{id:genId(),name:name.trim(),color,isRange}]);
    setName(''); setColor('#8b5cf6'); setIsRange(false);
  };

  const save = id => {
    setEventTypes(p=>p.map(t=>t.id===id?{...t,name:editName,color:editColor,isRange:editRange}:t));
    setEditId(null);
  };

  const remove = id => {
    if (uses(id)>0) { alert(`Dieser Typ wird in ${uses(id)} Eintr\u00e4gen verwendet.\nBitte zuerst die betreffenden Eintr\u00e4ge anpassen.`); return; }
    setEventTypes(p=>p.filter(t=>t.id!==id));
  };

  const startEdit = t => { setEditId(t.id); setEditName(t.name); setEditColor(t.color); setEditRange(!!t.isRange); };

  const inp = "bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-slate-200 placeholder-slate-600";

  return (
    <div className="up space-y-5 max-w-xl">
      <div>
        <h1 className="text-xl font-bold grad">Event-Typen</h1>
        <p className="text-slate-500 text-sm mt-0.5">Kategorien f&uuml;r Events verwalten</p>
      </div>

      <div className="glass rounded-2xl p-5 glow space-y-3">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider">Neuer Typ</p>
        <div className="flex gap-2">
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Name des Event-Typs"
            className={inp+" flex-1"} onKeyDown={e=>e.key==='Enter'&&add()}/>
          <button onClick={add}
            className="bg-violet-600 hover:bg-violet-500 text-white px-4 py-2.5 rounded-xl text-sm font-semibold transition-all whitespace-nowrap">
            Hinzuf&uuml;gen
          </button>
        </div>
        <ColorPicker value={color} onChange={setColor}/>
        <label className="flex items-center gap-3 cursor-pointer">
          <button type="button" onClick={()=>setIsRange(p=>!p)}
            className={`toggle ${isRange?'on':''}`}
            style={{background: isRange?'#f59e0b':'rgba(255,255,255,0.1)'}}/>
          <span className="text-slate-300 text-sm">Zeitraum-Event</span>
          <span className="text-slate-500 text-xs">(z. B. Freizeit, Konferenz &uuml;ber mehrere Tage)</span>
        </label>
      </div>

      <div className="glass rounded-2xl p-5 glow space-y-2">
        <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-3">Vorhandene Typen</p>
        {eventTypes.map(t=>(
          <div key={t.id} className="p-3 rounded-xl bg-white/[0.03] border border-white/6">
            {editId===t.id ? (
              <div className="space-y-3">
                <div className="flex gap-2 items-center">
                  <input value={editName} onChange={e=>setEditName(e.target.value)}
                    className={inp+" flex-1 py-1.5"} autoFocus onKeyDown={e=>e.key==='Enter'&&save(t.id)}/>
                  <button type="button" onClick={()=>setEditRange(p=>!p)}
                    className={`toggle flex-shrink-0 ${editRange?'on':''}`}
                    style={{background:editRange?'#f59e0b':'rgba(255,255,255,0.1)'}}
                    title={editRange?'Zeitraum-Event':'Einzeldatum'}/>
                  <button onClick={()=>save(t.id)}
                    className="w-7 h-7 flex items-center justify-center rounded-lg bg-emerald-900/40 text-emerald-400 hover:bg-emerald-900/60 transition-all">
                    <SI p={IC.check} size={13}/>
                  </button>
                  <button onClick={()=>setEditId(null)}
                    className="w-7 h-7 flex items-center justify-center rounded-lg bg-white/5 text-slate-500 hover:bg-white/10 transition-all">
                    <SI p={IC.x} size={13}/>
                  </button>
                </div>
                <ColorPicker value={editColor} onChange={setEditColor}/>
              </div>
            ) : (
              <div className="flex items-center gap-3">
                <span className="dot" style={{width:12,height:12,borderRadius:3,background:t.color,flexShrink:0}}/>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className="text-slate-200 text-sm font-medium">{t.name}</span>
                    {t.isRange&&<span className="pill" style={{background:'rgba(245,158,11,0.15)',color:'#f59e0b'}}>Zeitraum</span>}
                  </div>
                  <span className="text-slate-600 text-xs">{uses(t.id)} Eintr&auml;ge</span>
                </div>
                <span className="pill" style={{background:t.color+'22',color:t.color}}>{t.name}</span>
                <button onClick={()=>startEdit(t)}
                  className="w-7 h-7 flex items-center justify-center rounded-lg bg-white/5 hover:bg-blue-900/30 text-slate-500 hover:text-blue-400 transition-all">
                  <SI p={IC.edit} size={13}/>
                </button>
                <button onClick={()=>remove(t.id)}
                  className="w-7 h-7 flex items-center justify-center rounded-lg bg-white/5 hover:bg-red-900/25 text-slate-500 hover:text-red-400 transition-all">
                  <SI p={IC.trash} size={13}/>
                </button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
};

// вЂљГ®Г„вЂљГ®Г„ Sync-Status-Anzeige вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const SyncDot = ({ state }) => {
  const MAP = {
    connecting: ['#64748b', 'VerbindenвЂљГ„В¶'],
    synced:     ['#10b981', 'Synchronisiert'],
    saving:     ['#f59e0b', 'SpeichernвЂљГ„В¶'],
    error:      ['#ef4444', 'Offline'],
  };
  const [col, label] = MAP[state] || MAP.connecting;
  return (
    <div className="flex items-center gap-1.5 flex-shrink-0" title={label}>
      <span style={{
        width:7, height:7, borderRadius:'50%', background:col, display:'inline-block',
        boxShadow: state==='synced' ? `0 0 5px ${col}99` : 'none',
        animation: state==='saving' ? 'pulse 1s infinite' : 'none',
      }}/>
      <span className="text-xs text-slate-500 hidden md:block">{label}</span>
    </div>
  );
};

// вЂљГ®Г„вЂљГ®Г„ App вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
const App = () => {
  const [entries,    setEntries]    = useState(()=>{ try{const s=localStorage.getItem('revive-entries'); return s?JSON.parse(s):[];}catch{return[];} });
  const [eventTypes, setEventTypes] = useState(()=>{ try{const s=localStorage.getItem('revive-etypes'); return s?JSON.parse(s):DEFAULT_TYPES;}catch{return DEFAULT_TYPES;} });
  const [page,    setPage]    = useState('dashboard');
  const [editing, setEditing] = useState(null);
  const [syncState, setSyncState] = useState('connecting');

  // Refs to track what we last received from Firestore (to avoid write-back loops)
  const fsSnap   = useRef({ entries: null, types: null });
  const fsReady  = useRef(false);
  const writeTimer = useRef(null);

  // вЂљГ®Г„вЂљГ®Г„ Firestore real-time sync вЂљГ®Г„вЂљГ®Г„
  useEffect(() => {
    const unsubE = db.collection('revive').doc('entries').onSnapshot(snap => {
      const data = snap.data()?.data || [];
      fsSnap.current.entries = JSON.stringify(data);
      fsReady.current = true;
      setEntries(data);
      localStorage.setItem('revive-entries', JSON.stringify(data));
      setSyncState('synced');
    }, () => { fsReady.current = true; setSyncState('error'); });

    const unsubT = db.collection('revive').doc('eventTypes').onSnapshot(snap => {
      const data = snap.data()?.data;
      if (data) {
        fsSnap.current.types = JSON.stringify(data);
        setEventTypes(data);
        localStorage.setItem('revive-etypes', JSON.stringify(data));
      }
    }, () => {});

    return () => { unsubE(); unsubT(); };
  }, []);

  // Write entries to Firestore (debounced, skip if data came from Firestore)
  useEffect(() => {
    localStorage.setItem('revive-entries', JSON.stringify(entries));
    if (!fsReady.current) return;
    if (JSON.stringify(entries) === fsSnap.current.entries) return;
    setSyncState('saving');
    clearTimeout(writeTimer.current);
    writeTimer.current = setTimeout(() => {
      db.collection('revive').doc('entries').set({ data: entries })
        .then(() => setSyncState('synced'))
        .catch(() => setSyncState('error'));
    }, 1200);
  }, [entries]);

  // Write eventTypes to Firestore
  useEffect(() => {
    localStorage.setItem('revive-etypes', JSON.stringify(eventTypes));
    if (!fsReady.current) return;
    if (JSON.stringify(eventTypes) === fsSnap.current.types) return;
    db.collection('revive').doc('eventTypes').set({ data: eventTypes })
      .catch(() => {});
  }, [eventTypes]);

  const sorted = arr => [...arr].sort((a,b)=>a.date.localeCompare(b.date));

  const addEntry    = useCallback(e => { setEntries(p=>sorted([...p,{...e,id:genId()}])); setPage('entries'); }, []);
  const updateEntry = useCallback((id,d) => { setEntries(p=>sorted(p.map(e=>e.id===id?{...e,...d}:e))); setEditing(null); setPage('entries'); }, []);
  const deleteEntry = useCallback(id => { setEntries(p=>p.filter(e=>e.id!==id)); }, []);

  const importCSV = ev => {
    const file = ev.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = e => {
      const lines = e.target.result.split('\n').filter(Boolean);
      const imp = [];
      for (let i=1;i<lines.length;i++) {
        const c = lines[i].match(/(".*?"|[^,]+)/g)?.map(x=>x.replace(/^"|"$/g,'').replace(/""/g,'"'))||[];
        if (c[0]) imp.push({id:genId(),date:c[0],dateTo:'',event:c[1]||'',eventTypeId:'',
          besucher:Number(c[2])||0,erstbesucher:Number(c[3])||0,entscheidungen:Number(c[4])||0,taufen:Number(c[5])||0,notes:c[6]||''});
      }
      if (imp.length) { setEntries(p=>sorted([...p,...imp])); alert(`${imp.length} Eintr\u00e4ge importiert.`); }
    };
    r.readAsText(file); ev.target.value='';
  };

  const TABS = [
    {id:'dashboard', label:'Dashboard',    icon:IC.chart  },
    {id:'compare',   label:'Vergleich',    icon:IC.compare},
    {id:'form',      label:'Neuer Eintrag',icon:IC.plus   },
    {id:'entries',   label:'Eintr\u00e4ge',     icon:IC.list   },
    {id:'types',     label:'Event-Typen',  icon:IC.tag    },
  ];

  return (
    <div className="min-h-screen">
      <header style={{background:'rgba(15,15,26,0.95)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(255,255,255,0.07)',position:'sticky',top:0,zIndex:50}}>
        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
          <div className="w-8 h-8 rounded-xl flex items-center justify-center font-black text-white text-sm flex-shrink-0"
            style={{background:'linear-gradient(135deg,#8b5cf6,#ec4899)'}}>R</div>
          <div className="hidden sm:block mr-1">
            <div className="text-white font-bold text-sm leading-none">REVIVE</div>
            <div className="text-slate-600 text-xs">Youth Stats</div>
          </div>

          <nav className="flex gap-1 mx-auto flex-wrap justify-center">
            {TABS.map(t=>(
              <button key={t.id}
                onClick={()=>{ setPage(t.id); if (t.id!=='form') setEditing(null); }}
                className={`flex items-center gap-1.5 px-2.5 py-2 rounded-xl text-xs font-medium transition-all border ${
                  page===t.id?'bg-violet-600/20 border-violet-500/40 text-violet-300':'text-slate-500 hover:text-slate-300 border-transparent hover:bg-white/5'}`}>
                <SI p={t.icon} size={13}/>
                <span className="hidden sm:inline">{t.label}</span>
              </button>
            ))}
          </nav>

          <SyncDot state={syncState}/>

          <div className="flex gap-1.5 flex-shrink-0">
            <button onClick={()=>exportExcel(entries,eventTypes)}
              className="flex items-center gap-1.5 text-slate-500 hover:text-slate-300 bg-white/5 hover:bg-white/10 px-2.5 py-1.5 rounded-lg transition-all text-xs"
              title="Als Excel-Datei exportieren">
              <SI p={IC.download} size={13}/><span className="hidden sm:inline">Export</span>
            </button>
            <label className="flex items-center gap-1.5 text-slate-500 hover:text-slate-300 bg-white/5 hover:bg-white/10 px-2.5 py-1.5 rounded-lg transition-all text-xs cursor-pointer"
              title="CSV importieren">
              <SI p={IC.upload} size={13}/><span className="hidden sm:inline">Import</span>
              <input type="file" accept=".csv" onChange={importCSV} className="hidden"/>
            </label>
          </div>
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-6 pb-12">
        {page==='dashboard' && <Dashboard entries={entries} eventTypes={eventTypes}/>}
        {page==='compare'   && <Comparison entries={entries} eventTypes={eventTypes}/>}
        {page==='form'      && (
          <EntryForm key={editing?.id||'new'} initialData={editing} eventTypes={eventTypes}
            onSave={editing?(d)=>updateEntry(editing.id,d):addEntry}
            onCancel={editing?()=>{setEditing(null);setPage('entries');}:null}/>
        )}
        {page==='entries'   && (
          <EntryList entries={entries} eventTypes={eventTypes}
            onEdit={e=>{setEditing(e);setPage('form');}}
            onDelete={deleteEntry}
            onAdd={()=>{setEditing(null);setPage('form');}}/>
        )}
        {page==='types'     && <EventTypeManager eventTypes={eventTypes} setEventTypes={setEventTypes} entries={entries}/>}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
